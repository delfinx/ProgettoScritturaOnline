<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impostazioni</title>

<style>
body {
    margin: 0;
    height: 100vh;

    background-image: url("https://images.steamusercontent.com/ugc/16068201291932821482/864E8D7E0524AA9B6D77563108A03F52E63894AF/?imw=637&imh=358&ima=fit&impolicy=Letterbox&imcolor=%23000000&letterbox=true");
    background-size: cover;
    background-position: center;

    font-family: Arial;
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* contenitore principale */
.container {
    display: flex;
    flex-direction: column;
    gap: 30px;
}

/* box stile armadietto */
.box {
    width: 350px;
    padding: 20px;
    background: rgba(255,255,255,0.2);
    border: 3px solid white;
    border-radius: 10px;
    backdrop-filter: blur(5px);

    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* titolo */
.box h3 {
    margin: 0;
}

/* input */
input {
    padding: 10px;
    border: none;
    border-radius: 5px;
    font-size: 16px;
}

/* bottone */
button {
    padding: 10px;
    border: none;
    border-radius: 5px;
    background: #ff9800;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #e68900;
}
</style>
</head>

<body>

<div class="container">

    <!-- NICKNAME -->
    <div class="box">
        <h3>Nickname</h3>
        <input id="nickname" placeholder="Inserisci nickname">
        <button onclick="saveNickname()">Salva</button>
    </div>

    <!-- EMAIL -->
    <div class="box">
        <h3>Email</h3>
        <input id="email" placeholder="Inserisci email">
        <button onclick="saveEmail()">Salva</button>
    </div>

    <!-- PASSWORD -->
    <div class="box">
        <h3>Password</h3>
        <input id="password" type="password" placeholder="Nuova password">
        <button onclick="savePassword()">Salva</button>
    </div>

</div>

<script>
const API = "http://localhost:3000/auth";

/* nickname (frontend semplice per ora) */
function saveNickname(){
    const nick = document.getElementById("nickname").value;

    localStorage.setItem("nickname", nick);

    alert("Nickname salvato!");
}

/* email */
async function saveEmail(){
    const email = document.getElementById("email").value;

    await fetch(API + "/update-email", {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ email })
    });

    alert("Email aggiornata!");
}

/* password */
async function savePassword(){
    const password = document.getElementById("password").value;

    await fetch(API + "/update-password", {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ password })
    });

    alert("Password aggiornata!");
}
</script>

</body>
</html>
