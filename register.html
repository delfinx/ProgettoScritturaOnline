<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>


body{
    margin:0;
    font-family: Arial;
    height:100vh;
    display:flex;
    background-image: url(https://moewalls.com/wp-content/uploads/2025/11/minecraft-sakura-oasis-thumb.jpg);    
    color:white;
}

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45); /* livello di oscurità */
    z-index:-1;
}
/* layout */
.container{
    display:flex;
    width:100%;
}

/* lato sinistro */
.left{
    width:50%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
}

/* input */
input{
    padding:12px;
    width:250px;
    border:none;
    border-radius:6px;
    font-size:16px;
}

button{
    padding:12px 20px;
    border:none;
    background:#ff9800;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#ff7b00;
}

/* lato destro */
.right{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* steve */
#steve{
    width:500px;
}

/* animazione salto */
.jump{
    animation:jump 0.4s ease;
}

@keyframes jump{
    0%{transform:translateY(0);}
    50%{transform:translateY(-50px);}
    100%{transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">

<div class="left">
<h2>Registrati</h2>

<input id="email" placeholder="Email" oninput="steveJump()">
<input id="password" type="password" placeholder="Password" oninput="steveJump()">

<button onclick="reg()">Crea account</button>

<p id="msg"></p>

</div>

<div class="right">
<img id="steve" src="https://static.wikia.nocookie.net/minecraft/images/6/6f/SprintingSteve.png" alt="Steve">
</div>

</div>

<script>

document.addEventListener("keydown", function(event){

    const steve = document.getElementById("steve");

    if(event.key.length === 1){   // solo lettere o numeri
        steve.classList.add("jump");

        setTimeout(()=>{
            steve.classList.remove("jump");
        },400);
    }

});

async function reg(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:3000/auth/register",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  document.getElementById("msg").innerText = data.message;
}

</script>

</body>
</html>
