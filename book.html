<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Libro</title>

<style>
body{
    margin:0;
    height:100vh;
    background-image:url("https://i.redd.it/a-library-that-i-made-v0-rbued4durtc81.png");
    background-size:cover;
    font-family:Arial;
}

/* oscuramento */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    z-index:-1;
}

/* contenitore libro */
.book-container{
    width:75%;
    height:80%;
    margin-left:15%;
    margin-right:10%;
    margin-top:5%;
    display:flex;
    box-shadow:0 0 40px rgba(0,0,0,0.7);
}

/* pagine */
.page{
    width:50%;
    background:#f5e6c8;
    padding:20px;
    box-sizing:border-box;
    border:1px solid #ccc;
}

/* effetto piega */
.left{
    border-right:2px solid #aaa;
}

.right{
    border-left:2px solid #aaa;
}

/* titolo */
h2{
    text-align:center;
}

textarea{
    width:100%;
    height:90%;
    border:none;
    background:transparent;
    resize:none;
    font-size:16px;
}
</style>
</head>

<body>

<div class="book-container">
    <div class="page left">
        <h2>Pagina sinistra</h2>
        <textarea placeholder="Scrivi qui..."></textarea>
    </div>

    <div class="page right">
        <h2>Pagina destra</h2>
        <textarea placeholder="Continua qui..."></textarea>
    </div>
</div>

</body>
</html>
