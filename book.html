<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Libro</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-image: url("https://wallpapercave.com/wp/wp8389711.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
        }

        /* contenitore libro */
        .book-container {
            width: 75%;
            height: 80%;
            margin-left: 15%;
            margin-right: 10%;
            margin-top: 100px;
            display: flex;
        }

        /* pagine */
        .page {
            width: 50%;
            background: #f5e6c8;
            padding: 20px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            margin-top: 30px;
        }

        /* effetto piega */
        .left {
            border-right: 2px solid #aaa;
        }

        .right {
            border-left: 2px solid #aaa;
        }

        /* titolo */
        h2 {
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 90%;
            border: none;
            background: transparent;
            resize: none;
            font-size: 16px;
        }

        .sidebar {
            position: fixed;
            left: 100px;
            margin-top: 18%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .box {
            width: 100px;
            height: 100px;
            background: #999;
            border: 3px solid black;
        }

        .back {
            width: 100px;
            height: 100px;
            background: #555;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            border: 3px solid;
            border-color: rgb(0, 0, 0);
        }

        .next,
        .prev {
            position: fixed;
            top: 15%;
            transform: translateY(-50%);
            font-size: 90px;
            background: none;
            border: none;
            color: rgb(173, 82, 138);
            cursor: pointer;
        }

        .next {
            right: 810px;
            margin-top: 20px;
        }

        .prev {
            left: 906px;
            margin-top: 20px;
        }

        .counter {
            font-size: 45px;
            position: fixed;
            top: 160px;
            right: 30px;
            background: rgba(219, 216, 216, 0.5);
            padding: 10px 15px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body> 
    
    <button class="next" onclick="nextPage()">➡</button> <button class="prev" onclick="prevPage()">⬅</button>
    <div class="sidebar">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="back" onclick="goBack()">⬅</div>
    </div>

    <div class="book-container">
        <div class="page left">
            <h2>Pagina sinistra</h2> <textarea oninput="limitWords(this)" placeholder="Scrivi quiiii..."></textarea>
        </div>
        <div class="page right">
            <h2>Pagina destra</h2> <textarea oninput="limitWords(this)" placeholder="Continua quiii..."></textarea>
        </div>
    </div>
    
    <div class="counter"> <span id="pageLeft">1</span> - <span id="pageRight">2</span> </div> <textarea
    
    oninput="limitWords(this)"></textarea>
    <div class="char-counter">0 / 200</div>
    
    <script> 
    
    let currentPage = 1;
    let pages = ["", ""]; // pagina 1 e 2

    function nextPage(){
        const left = document.querySelector(".left textarea");
        const right = document.querySelector(".right textarea");

        // salva entrambe le pagine attuali
        pages[currentPage] = left.value;
        pages[currentPage + 1] = right.value;

        // vai avanti di 2 pagine
        currentPage += 2;

        // carica nuove pagine
        left.value = pages[currentPage] || "";
        right.value = pages[currentPage + 1] || "";

        updateCounter();
    }

    function prevPage(){
        if(currentPage <= 1) return;

        const left = document.querySelector(".left textarea");
        const right = document.querySelector(".right textarea");

        // salva pagine attuali
        pages[currentPage] = left.value;
        pages[currentPage + 1] = right.value;

        // torna indietro di 2
        currentPage -= 2;

        // carica pagine precedenti
        left.value = pages[currentPage] || "";
        right.value = pages[currentPage + 1] || "";

        updateCounter();
            }
        
        function limitWords(textarea){
        let text = textarea.value;

        if(text.length > 500){
            text = text.substring(0, 500);
        }

        let words = text.trim().split(/\s+/);

        if(words.length > 50){
            words = words.slice(0,50);
            text = words.join(" ");
        }

        textarea.value = text;

        // aggiorna contatore
        const counter = textarea.parentElement.querySelector(".char-counter");
        if(counter){
            counter.innerText = text.length + " / 200";
        }
    }

    function updateCounter() { 
        document.getElementById("pageLeft").innerText = currentPage; 
        document.getElementById("pageRight").innerText = currentPage + 1; 
        } 
        
    updateCounter(); 
    
    function goBack(){
    window.location.href = "libreria.html";
        }
    
        
    </script>
</body>

</html>
